<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 40 40"
     width="40"
     height="40"
     role="img"
     aria-label="Golden Sunflower network icon">
  <title>Golden Sunflower</title>
  <defs>
    <radialGradient id="grad-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE033"/>
      <stop offset="100%" stop-color="#C5A059"/>
    </radialGradient>
    <radialGradient id="grad-outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Grid axis lines -->
  <line x1="20" y1="20" x2="20" y2="7"  stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="20" x2="33" y2="20" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="20" x2="20" y2="33" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="20" x2="7"  y2="20" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <!-- Outer ring – talent network (8 dots) -->
  <circle cx="20"   cy="7"    r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="29.2" cy="10.8" r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="33"   cy="20"   r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="29.2" cy="29.2" r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="20"   cy="33"   r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="10.8" cy="29.2" r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="7"    cy="20"   r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <circle cx="10.8" cy="10.8" r="1.5" fill="url(#grad-outer)" opacity="0.9"/>
  <!-- Inner ring (4 dots) -->
  <circle cx="20" cy="13" r="1.0" fill="#FFD700" opacity="0.55"/>
  <circle cx="27" cy="20" r="1.0" fill="#FFD700" opacity="0.55"/>
  <circle cx="20" cy="27" r="1.0" fill="#FFD700" opacity="0.55"/>
  <circle cx="13" cy="20" r="1.0" fill="#FFD700" opacity="0.55"/>
  <!-- Central dot – Brisbane HQ -->
  <circle cx="20" cy="20" r="4" fill="url(#grad-center)" filter="url(#glow)"/>
</svg>